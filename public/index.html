<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Request Hub</title>
<style>
  :root {
    --peach: #ffe5cb;
    --peach-deep: #ffd4ac;
    --cream: #fff9f3;
    --ink: #2c2419;
    --muted: #8a7c6a;
    --line: #efe2d3;
    --card: #ffffff;
    --accent: #e8875a;
    --accent-deep: #d06f42;
    --green: #2e9e6b;
    --blue: #3d7ec4;
    --purple: #8a63c9;
    --gray: #9aa0a6;
    --shadow: 0 1px 3px rgba(80, 60, 40, 0.08), 0 6px 20px rgba(80, 60, 40, 0.06);
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: linear-gradient(180deg, var(--peach) 0%, var(--cream) 260px, var(--cream) 100%);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1160px; margin: 0 auto; padding: 28px 24px 64px; }
  header.app { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
  .logo {
    width: 42px; height: 42px; border-radius: 12px; flex: none;
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 20px;
    box-shadow: var(--shadow);
  }
  header.app h1 { font-size: 22px; margin: 0; letter-spacing: -0.02em; }
  header.app p { margin: 2px 0 0; color: var(--muted); font-size: 13px; }

  nav.tabs { display: flex; gap: 6px; flex-wrap: wrap; margin: 22px 0 20px; }
  nav.tabs button {
    border: 1px solid transparent; background: rgba(255,255,255,0.55); color: var(--ink);
    padding: 9px 16px; border-radius: 999px; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all .15s ease;
  }
  nav.tabs button:hover { background: #fff; }
  nav.tabs button.active { background: var(--ink); color: var(--peach); }

  .panel { display: none; animation: fade .25s ease; }
  .panel.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  /* KPI cards */
  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .kpi {
    background: var(--card); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow);
    border: 1px solid var(--line); position: relative; overflow: hidden;
  }
  .kpi .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
  .kpi .k-label { font-size: 13px; color: var(--muted); font-weight: 600; }
  .kpi .k-num { font-size: 36px; font-weight: 800; margin-top: 6px; letter-spacing: -0.03em; }
  .kpi.active .dot { background: var(--gray); }
  .kpi.review .dot { background: var(--purple); }
  .kpi.progress .dot { background: var(--blue); }
  .kpi.completed .dot { background: var(--green); }

  .section-title { font-size: 15px; font-weight: 700; margin: 30px 0 12px; display:flex; align-items:center; gap:8px; }
  .card {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    border: 1px solid var(--line); overflow: hidden;
  }

  /* Recent feed */
  .feed-row {
    display: flex; align-items: center; gap: 14px; padding: 14px 18px; border-top: 1px solid var(--line);
    text-decoration: none; color: inherit; transition: background .12s ease;
  }
  .feed-row:first-child { border-top: none; }
  .feed-row:hover { background: var(--cream); }
  .feed-row .pill { flex: none; }
  .feed-row .f-name { font-weight: 600; font-size: 14px; }
  .feed-row .f-meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .feed-row .f-when { margin-left: auto; color: var(--muted); font-size: 12px; white-space: nowrap; }

  .pill {
    display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600;
    background: var(--peach); color: var(--accent-deep);
  }
  .status-pill { padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; white-space: nowrap; }

  /* Form */
  .form-card { padding: 22px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .field .req { color: var(--accent-deep); }
  .field input, .field select, .field textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px; font-size: 14px;
    background: #fff; color: var(--ink); font-family: inherit;
  }
  .field textarea { min-height: 84px; resize: vertical; }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,135,90,0.15);
  }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
  .btn {
    background: var(--accent); color: #fff; border: none; padding: 11px 22px; border-radius: 10px;
    font-size: 14px; font-weight: 700; cursor: pointer; transition: background .15s ease;
  }
  .btn:hover { background: var(--accent-deep); }
  .btn:disabled { opacity: .55; cursor: default; }
  .btn.secondary { background: #fff; color: var(--ink); border: 1px solid var(--line); }
  .btn.secondary:hover { background: var(--cream); }

  .cat-picker { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 8px; }
  .cat-picker button {
    border: 1px solid var(--line); background: #fff; border-radius: 12px; padding: 14px 8px; cursor: pointer;
    font-weight: 600; font-size: 14px; transition: all .15s ease;
  }
  .cat-picker button:hover { border-color: var(--accent); }
  .cat-picker button.active { background: var(--ink); color: var(--peach); border-color: var(--ink); }
  .cat-emoji { display:block; font-size: 22px; margin-bottom: 6px; }

  /* Tables */
  .table-controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
  .table-controls input[type=search], .table-controls select {
    padding: 9px 12px; border: 1px solid var(--line); border-radius: 10px; font-size: 14px; background: #fff;
  }
  .table-controls input[type=search] { flex: 1; min-width: 200px; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted);
    padding: 12px 16px; border-bottom: 1px solid var(--line); font-weight: 700; background: var(--cream);
  }
  tbody td { padding: 13px 16px; border-bottom: 1px solid var(--line); font-size: 14px; vertical-align: top; }
  tbody tr:hover { background: var(--cream); }
  tbody td a { color: var(--accent-deep); text-decoration: none; font-weight: 600; }
  tbody td a:hover { text-decoration: underline; }
  .load-more-wrap { padding: 16px; text-align: center; }

  .toast {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: #fff; padding: 13px 22px; border-radius: 12px; font-size: 14px; font-weight: 600;
    box-shadow: var(--shadow); opacity: 0; pointer-events: none; transition: all .25s ease; z-index: 50; max-width: 90vw;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: #b23a2e; }

  .empty, .loading { color: var(--muted); font-size: 14px; padding: 28px 18px; text-align: center; }
  .subnav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .subnav button {
    border: 1px solid var(--line); background: #fff; padding: 7px 14px; border-radius: 999px; cursor: pointer;
    font-size: 13px; font-weight: 600; color: var(--ink);
  }
  .subnav button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .skeleton { background: linear-gradient(90deg, #f3ece3 25%, #faf4ec 50%, #f3ece3 75%); background-size: 200% 100%; animation: sk 1.2s infinite; border-radius: 6px; height: 14px; }
  @keyframes sk { from { background-position: 200% 0; } to { background-position: -200% 0; } }

  @media (max-width: 780px) {
    .kpis { grid-template-columns: repeat(2, 1fr); }
    .cat-picker { grid-template-columns: repeat(3, 1fr); }
    .grid2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div class="logo">R</div>
    <div>
      <h1>Request Hub</h1>
      <p>Route requests, organize work.</p>
    </div>
  </header>

  <nav class="tabs">
    <button data-tab="dashboard" class="active">Dashboard</button>
    <button data-tab="submit">Submit a Request</button>
    <button data-tab="track">Track Requests</button>
  </nav>

  <!-- DASHBOARD -->
  <section class="panel active" id="panel-dashboard">
    <div class="kpis" id="kpis">
      <div class="kpi active"><div class="k-label"><span class="dot"></span>Active</div><div class="k-num" id="kpi-active">—</div></div>
      <div class="kpi review"><div class="k-label"><span class="dot"></span>In Review</div><div class="k-num" id="kpi-review">—</div></div>
      <div class="kpi progress"><div class="k-label"><span class="dot"></span>In Progress</div><div class="k-num" id="kpi-progress">—</div></div>
      <div class="kpi completed"><div class="k-label"><span class="dot"></span>Completed</div><div class="k-num" id="kpi-completed">—</div></div>
    </div>

    <div class="section-title">Recent submissions</div>
    <div class="card" id="feed"><div class="loading">Loading recent submissions…</div></div>
  </section>

  <!-- SUBMIT -->
  <section class="panel" id="panel-submit">
    <div class="section-title">What kind of request is this?</div>
    <div class="cat-picker" id="cat-picker"></div>
    <div class="card form-card">
      <form id="request-form" autocomplete="off"></form>
    </div>
  </section>

  <!-- TRACK -->
  <section class="panel" id="panel-track">
    <div class="subnav" id="track-subnav"></div>
    <div class="table-controls">
      <input type="search" id="track-search" placeholder="Search by name…" />
      <select id="track-status"><option value="">All statuses</option></select>
      <button class="btn secondary" id="track-refresh">Refresh</button>
    </div>
    <div class="card">
      <table>
        <thead id="track-thead"></thead>
        <tbody id="track-tbody"></tbody>
      </table>
      <div class="load-more-wrap" id="track-loadmore-wrap" style="display:none">
        <button class="btn secondary" id="track-loadmore">Load more</button>
      </div>
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
// ---------------------------------------------------------------------------
// Client config. Field definitions mirror the server's board map so the
// dynamic form renders the right inputs per category. The server is the
// authority on routing + column IDs; the client only needs field keys + labels.
// ---------------------------------------------------------------------------
const API = '/api/monday';

const CATEGORIES = {
  procurement: {
    label: 'Procurement', emoji: '📦',
    fields: [
      { key: 'name', label: 'Request Title', type: 'text', required: true },
      { key: 'requestType', label: 'Request Type', type: 'select', options: ['Apparel','Supplies','Equipment','Marketing Materials','Other'] },
      { key: 'department', label: 'Department', type: 'select', options: ['Maintenance','Front Desk','Food & Beverage','Housekeeping','Security','Spa'] },
      { key: 'priority', label: 'Priority', type: 'select', options: ['Low','Medium','High'] },
      { key: 'requesterName', label: 'Requester Name', type: 'text' },
      { key: 'requesterEmail', label: 'Requester Email', type: 'email' },
      { key: 'dueDate', label: 'Due Date', type: 'date' },
      { key: 'budget', label: 'Budget ($)', type: 'number' },
      { key: 'description', label: 'Description', type: 'textarea', full: true },
    ],
  },
  uniform: {
    label: 'Uniform', emoji: '👔',
    fields: [
      { key: 'name', label: 'Request Title', type: 'text', required: true },
      { key: 'uniformType', label: 'Uniform Type', type: 'select', options: ['Outerwear (jacket, vest, coat)','Shirt/Blouse','Pants/Skirt','T-shirt','Polo','Accessories (tie, scarf, hat)','Footwear','Other'] },
      { key: 'departmentRole', label: 'Department / Role', type: 'text' },
      { key: 'quantity', label: 'Quantity', type: 'number' },
      { key: 'dueDate', label: 'Due Date', type: 'date' },
      { key: 'sizeRequirements', label: 'Size Requirements', type: 'textarea', full: true },
      { key: 'requirements', label: 'Specific Requirements (colors, styles, branding)', type: 'textarea', full: true },
      { key: 'notes', label: 'Notes', type: 'textarea', full: true },
    ],
  },
  creative: {
    label: 'Creative', emoji: '🎨',
    fields: [
      { key: 'name', label: 'Project Name', type: 'text', required: true },
      { key: 'contentType', label: 'Content Type', type: 'select', options: ['Graphic Design','Photography','Videography','Copywriting','Deck','Other'] },
      { key: 'departmentOutlet', label: 'Department or Outlet', type: 'text' },
      { key: 'email', label: 'Your Email Address', type: 'email' },
      { key: 'idealDueDate', label: 'Ideal Due Date', type: 'date' },
      { key: 'projectDescription', label: 'Project Description', type: 'textarea', full: true, required: true },
    ],
  },
  event: {
    label: 'Event', emoji: '🎪',
    fields: [
      { key: 'name', label: 'Event Name', type: 'text', required: true },
      { key: 'requestType', label: 'Request Type', type: 'select', options: ['Conference','Webinar','Workshop','Trade Show','Internal Event','Sponsorship','Other'] },
      { key: 'priority', label: 'Priority', type: 'select', options: ['Low','Medium','High','Urgent'] },
      { key: 'requesterName', label: 'Requester Name', type: 'text' },
      { key: 'requesterEmail', label: 'Requester Email', type: 'email' },
      { key: 'dueDate', label: 'Due Date', type: 'date' },
      { key: 'budget', label: 'Budget ($)', type: 'number' },
      { key: 'description', label: 'Description', type: 'textarea', full: true },
    ],
  },
  design: {
    label: 'Design', emoji: '✏️',
    fields: [
      { key: 'name', label: 'Request Title', type: 'text', required: true },
      { key: 'requestType', label: 'Request Type', type: 'select', options: ['Logo','Brand Assets','Print Materials','Digital Graphics','Video','Other'] },
      { key: 'priority', label: 'Priority', type: 'select', options: ['Low','Medium','High','Urgent'] },
      { key: 'requesterName', label: 'Requester Name', type: 'text' },
      { key: 'requesterEmail', label: 'Requester Email', type: 'email' },
      { key: 'dueDate', label: 'Due Date', type: 'date' },
      { key: 'budget', label: 'Budget ($)', type: 'number' },
      { key: 'description', label: 'Description', type: 'textarea', full: true },
    ],
  },
};

// Human labels for the column IDs returned in tracking tables.
const COLUMN_LABELS = {
  color_mm1gjsqg: 'Status', dropdown_mm57trse: 'Request Type', color_mm1gy17s: 'Department',
  color_mm1gfcfb: 'Priority', date_mm57f4s6: 'Due Date', numeric_mm57r30c: 'Budget',
  color_mm3yma9j: 'Status', dropdown_mm3y16t7: 'Uniform Type', text_mm3yghj8: 'Department/Role',
  numeric_mm3ygc6y: 'Quantity', date_mm3y77nq: 'Due Date',
  status8: 'Status', dropdown_mkpwtq12: 'Content Type', text_mkpw8xrc: 'Department/Outlet', date_mkpwatyw: 'Ideal Due Date',
  color_mm57kea7: 'Status', dropdown_mm57d6ce: 'Request Type', color_mm57bde7: 'Priority', date_mm57gw1w: 'Due Date', numeric_mm57k2sz: 'Budget',
  color_mm57t0bg: 'Status', dropdown_mm57kttm: 'Request Type', color_mm577rx0: 'Priority', date_mm57mnp: 'Due Date', numeric_mm57wgvs: 'Budget',
};

// Status options per category for the tracking filter dropdown.
const STATUS_OPTIONS = {
  procurement: ['New','Under Review','Approved','Ordered','Received','Rejected'],
  uniform: ['New Request','Sourcing','Ordered','In Transit','Delivered'],
  creative: ['New','Working On It','Pending review','Completed/Live','Stuck','Move to DAM'],
  event: ['New Request','In Review','In Progress','On Hold','Completed','Cancelled'],
  design: ['New Request','In Review','In Progress','On Hold','Completed','Cancelled'],
};

function statusColor(label) {
  const s = (label || '').toLowerCase();
  if (/(cancel|reject|stuck)/.test(s)) return { bg:'#fbe3e0', fg:'#b23a2e' };
  if (/(complete|received|delivered|live|done)/.test(s)) return { bg:'#e2f3ea', fg:'#2e7d51' };
  if (/(review|pending)/.test(s)) return { bg:'#efe6fa', fg:'#6f4bb0' };
  if (/(progress|working|sourcing|ordered|transit|approved|assigned)/.test(s)) return { bg:'#e4eefb', fg:'#356bb0' };
  return { bg:'#fff0e2', fg:'#c06a3d' }; // new / active
}

// ---------------------------------------------------------------------------
// API helper
// ---------------------------------------------------------------------------
async function callApi(payload) {
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  const json = await res.json().catch(() => ({ ok:false, error:'Bad response from server.' }));
  if (!res.ok || json.ok === false) throw new Error(json.error || ('Request failed ('+res.status+').'));
  return json;
}

function toast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => { t.className = 'toast'; }, 3800);
}

function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmtWhen(iso) {
  if (!iso) return '';
  const d = new Date(iso); if (isNaN(d)) return '';
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
  return d.toLocaleDateString(undefined, { month:'short', day:'numeric' });
}

// ---------------------------------------------------------------------------
// Tabs
// ---------------------------------------------------------------------------
document.querySelectorAll('nav.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'dashboard') loadDashboard();
    if (btn.dataset.tab === 'track') loadTrack(currentTrackCat, true);
  });
});

// ---------------------------------------------------------------------------
// Dashboard
// ---------------------------------------------------------------------------
async function loadDashboard() {
  const feed = document.getElementById('feed');
  ['active','review','progress','completed'].forEach(k => document.getElementById('kpi-'+k).textContent = '—');
  feed.innerHTML = '<div class="loading">Loading recent submissions…</div>';
  try {
    const [counts, recent] = await Promise.all([
      callApi({ action: 'dashboard-counts' }),
      callApi({ action: 'recent-submissions', limit: 15 }),
    ]);
    document.getElementById('kpi-active').textContent = counts.totals.active;
    document.getElementById('kpi-review').textContent = counts.totals.review;
    document.getElementById('kpi-progress').textContent = counts.totals.progress;
    document.getElementById('kpi-completed').textContent = counts.totals.completed;

    if (!recent.items.length) { feed.innerHTML = '<div class="empty">No submissions yet.</div>'; return; }
    feed.innerHTML = recent.items.map(it => {
      const c = statusColor(it.status);
      return `<a class="feed-row" href="${esc(it.url)}" target="_blank" rel="noopener">
        <span class="pill">${esc(it.category)}</span>
        <span>
          <span class="f-name">${esc(it.name)}</span>
          <span class="f-meta">${it.status ? '<span class="status-pill" style="background:'+c.bg+';color:'+c.fg+'">'+esc(it.status)+'</span>' : ''}</span>
        </span>
        <span class="f-when">${esc(fmtWhen(it.createdAt))}</span>
      </a>`;
    }).join('');
  } catch (e) {
    feed.innerHTML = '<div class="empty">Could not load dashboard: ' + esc(e.message) + '</div>';
  }
}

// ---------------------------------------------------------------------------
// Submit form
// ---------------------------------------------------------------------------
let currentCat = 'procurement';
const catPicker = document.getElementById('cat-picker');
Object.entries(CATEGORIES).forEach(([key, cfg]) => {
  const b = document.createElement('button');
  b.innerHTML = '<span class="cat-emoji">'+cfg.emoji+'</span>'+cfg.label;
  b.className = key === currentCat ? 'active' : '';
  b.addEventListener('click', () => { currentCat = key;
    catPicker.querySelectorAll('button').forEach(x => x.classList.remove('active'));
    b.classList.add('active'); renderForm(); });
  catPicker.appendChild(b);
});

function renderForm() {
  const cfg = CATEGORIES[currentCat];
  const form = document.getElementById('request-form');
  let html = '<div class="grid2">';
  cfg.fields.forEach((f, i) => {
    const full = f.full || f.type === 'textarea';
    const wrapStyle = full ? ' style="grid-column:1 / -1"' : '';
    let input;
    const req = f.required ? ' required' : '';
    if (f.type === 'select') {
      input = '<select name="'+f.key+'"'+req+'><option value="">— Select —</option>' +
        f.options.map(o => '<option value="'+esc(o)+'">'+esc(o)+'</option>').join('') + '</select>';
    } else if (f.type === 'textarea') {
      input = '<textarea name="'+f.key+'"'+req+'></textarea>';
    } else {
      input = '<input type="'+f.type+'" name="'+f.key+'"'+req+' />';
    }
    html += '<div class="field"'+wrapStyle+'><label>'+esc(f.label)+(f.required?' <span class="req">*</span>':'')+'</label>'+input+'</div>';
  });
  html += '</div>';
  html += '<div style="margin-top:8px"><button type="submit" class="btn" id="submit-btn">Submit '+esc(cfg.label)+' Request</button></div>';
  form.innerHTML = html;
}

document.getElementById('request-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const cfg = CATEGORIES[currentCat];
  const fields = {};
  new FormData(e.target).forEach((v, k) => { if (String(v).trim() !== '') fields[k] = v; });
  if (!fields.name) { toast('Please add a title.', true); return; }
  btn.disabled = true; btn.textContent = 'Submitting…';
  try {
    const res = await callApi({ action: 'create-routed-request', category: currentCat, fields });
    toast('Sent to ' + res.board + ' → ' + res.itemName);
    e.target.reset();
    renderForm();
  } catch (err) {
    toast('Submit failed: ' + err.message, true);
  } finally {
    btn.disabled = false; btn.textContent = 'Submit ' + cfg.label + ' Request';
  }
});

// ---------------------------------------------------------------------------
// Track tables (search + filter + load more)
// ---------------------------------------------------------------------------
let currentTrackCat = 'procurement';
let trackCursor = null;
let trackLoadedFilter = { search:'', status:'' };

const trackSubnav = document.getElementById('track-subnav');
Object.entries(CATEGORIES).forEach(([key, cfg]) => {
  const b = document.createElement('button');
  b.textContent = cfg.emoji + ' ' + cfg.label;
  b.className = key === currentTrackCat ? 'active' : '';
  b.addEventListener('click', () => {
    currentTrackCat = key;
    trackSubnav.querySelectorAll('button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('track-search').value = '';
    document.getElementById('track-status').value = '';
    loadTrack(key, true);
  });
  trackSubnav.appendChild(b);
});

document.getElementById('track-refresh').addEventListener('click', () => loadTrack(currentTrackCat, true));
let searchDebounce;
document.getElementById('track-search').addEventListener('input', () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => loadTrack(currentTrackCat, true), 350);
});
document.getElementById('track-status').addEventListener('change', () => loadTrack(currentTrackCat, true));
document.getElementById('track-loadmore').addEventListener('click', () => loadTrack(currentTrackCat, false));

function buildStatusFilter(cat) {
  const sel = document.getElementById('track-status');
  const opts = STATUS_OPTIONS[cat] || [];
  sel.innerHTML = '<option value="">All statuses</option>' + opts.map(o => '<option value="'+esc(o)+'">'+esc(o)+'</option>').join('');
}

async function loadTrack(cat, reset) {
  const thead = document.getElementById('track-thead');
  const tbody = document.getElementById('track-tbody');
  const lmWrap = document.getElementById('track-loadmore-wrap');
  const search = document.getElementById('track-search').value.trim();
  const status = document.getElementById('track-status').value.trim();

  if (reset) {
    trackCursor = null;
    trackLoadedFilter = { search, status };
    buildStatusFilter(cat);
    // header uses the previous known columns until data arrives
    tbody.innerHTML = '<tr><td colspan="6"><div class="loading">Loading…</div></td></tr>';
    lmWrap.style.display = 'none';
  }

  try {
    const res = await callApi({
      action: 'list-board-items',
      category: cat,
      search: trackLoadedFilter.search || undefined,
      status: trackLoadedFilter.status || undefined,
      cursor: reset ? undefined : trackCursor,
      limit: 25,
    });

    // Header
    const cols = res.columns;
    thead.innerHTML = '<tr><th>Name</th>' + cols.map(c => '<th>'+esc(COLUMN_LABELS[c] || c)+'</th>').join('') + '</tr>';

    const rowsHtml = res.items.map(it => {
      const tds = cols.map(c => {
        const val = it.columns[c] || '';
        if (COLUMN_LABELS[c] === 'Status' || c === res.statusColumn) {
          if (!val) return '<td></td>';
          const col = statusColor(val);
          return '<td><span class="status-pill" style="background:'+col.bg+';color:'+col.fg+'">'+esc(val)+'</span></td>';
        }
        return '<td>'+esc(val)+'</td>';
      }).join('');
      return '<tr><td><a href="'+esc(it.url)+'" target="_blank" rel="noopener">'+esc(it.name)+'</a></td>'+tds+'</tr>';
    }).join('');

    if (reset) {
      tbody.innerHTML = rowsHtml || '<tr><td colspan="'+(cols.length+1)+'"><div class="empty">No matching requests.</div></td></tr>';
    } else {
      tbody.insertAdjacentHTML('beforeend', rowsHtml);
    }

    trackCursor = res.nextCursor;
    lmWrap.style.display = res.hasMore ? 'block' : 'none';
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="6"><div class="empty">Could not load: '+esc(e.message)+'</div></td></tr>';
    lmWrap.style.display = 'none';
  }
}

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
renderForm();
loadDashboard();
</script>
