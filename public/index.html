<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Request Hub — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --foam: #fbf8f0; --white: #fff; --seaweed: #092e36; --yellow: #ffc03f;
    --sand: #faf1c0; --ocean: #3d6395; --line: rgba(9,46,54,0.14); --muted: #6d7a77; --red: #b23a2e;
  }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; background: var(--foam); color: var(--seaweed);
    font-family: "Poppins", -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased;
    display: grid; place-items: center; padding: 24px; }
  .card { background: var(--white); border: 1px solid var(--line); border-radius: 18px; padding: 38px 34px;
    width: 100%; max-width: 430px; box-shadow: 0 12px 40px rgba(9,46,54,0.07); }
  .mark { width: 52px; height: 52px; border-radius: 14px; background: var(--yellow); display: grid; place-items: center; margin-bottom: 20px; }
  .mark svg { width: 30px; height: 30px; color: var(--seaweed); }
  h1 { font-family: "Fraunces", Georgia, serif; font-weight: 600; font-size: 27px; margin: 0 0 6px; letter-spacing: -0.01em; }
  .sub { color: var(--muted); font-size: 14px; margin: 0 0 26px; line-height: 1.5; }
  label { display: block; font-size: 12.5px; font-weight: 600; margin-bottom: 7px; color: var(--seaweed); }
  input { width: 100%; padding: 12px 14px; border: 1px solid var(--line); border-radius: 10px; font-size: 15px;
    font-family: inherit; color: var(--seaweed); background: #fff; }
  input:focus { outline: none; border-color: var(--yellow); box-shadow: 0 0 0 3px rgba(255,192,63,0.28); }
  button { width: 100%; margin-top: 16px; padding: 13px; border: none; border-radius: 10px; background: var(--seaweed);
    color: var(--foam); font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; transition: opacity .15s ease; }
  button:hover { opacity: .92; } button:disabled { opacity: .55; cursor: default; }
  .msg { margin-top: 15px; font-size: 13.5px; line-height: 1.5; display: none; }
  .msg.show { display: block; }
  .msg.error { color: var(--red); }
  .foot { margin-top: 24px; font-size: 12px; color: var(--muted); text-align: center; }
</style>
</head>
<body>
  <div class="card">
    <div class="mark" id="mark"></div>
    <h1>Request Hub</h1>
    <p class="sub">Centralized Request Management System for The Sunny Hotel</p>
    <form id="gate-form" autocomplete="on">
      <label for="email">Work email</label>
      <input type="email" id="email" name="email" placeholder="you@lemonadehospitality.com" required autocomplete="email" />
      <button type="submit" id="go">Continue</button>
    </form>
    <div class="msg" id="msg"></div>
    <div class="foot">Access is limited to approved team members.</div>
  </div>

<script>
const API = '/api/monday';
document.getElementById('mark').innerHTML = sunMark();
function sunMark() {
  const rays = Array.from({length: 8}, (_, i) => {
    const a = (i * Math.PI) / 4, x1 = 12 + Math.cos(a) * 7.5, y1 = 12 + Math.sin(a) * 7.5, x2 = 12 + Math.cos(a) * 10.5, y2 = 12 + Math.sin(a) * 10.5;
    return `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}"/>`;
  }).join('');
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.4" fill="currentColor" stroke="none"/>${rays}</svg>`;
}

// If already signed in, skip the gate.
try { if (localStorage.getItem('rh_token')) location.replace('app'); } catch (e) {}

const form = document.getElementById('gate-form');
const msg = document.getElementById('msg');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('go');
  const email = document.getElementById('email').value.trim();
  msg.className = 'msg';
  btn.disabled = true; btn.textContent = 'Checking…';
  try {
    const res = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'verify-email', email }) });
    const json = await res.json().catch(() => ({ ok: false, error: 'Unexpected response.' }));
    if (!res.ok || json.ok === false) throw new Error(json.error || 'Something went wrong.');
    if (json.approved) {
      try { localStorage.setItem('rh_token', json.token); localStorage.setItem('rh_email', json.email || email); } catch (e) {}
      location.href = 'app';
    } else {
      msg.textContent = "That email isn't on the approved list. Check the address, or ask an admin to add you.";
      msg.className = 'msg show error';
      btn.disabled = false; btn.textContent = 'Continue';
    }
  } catch (err) {
    msg.textContent = err.message;
    msg.className = 'msg show error';
    btn.disabled = false; btn.textContent = 'Continue';
  }
});
</script>
</body>
</html>
